# Set prefix to Ctrl+a instead of default Ctrl+b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Make reloading tmux config easier
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux config."

# Use vi keys in copy mode
setw -g mode-keys vi

# Enable mouse support (scrolling, selecting panes)
set -g mouse on

# Split windows more intuitively
unbind '"'
unbind %
bind | split-window -h   # Vertical split (left/right)
bind _ split-window -v   # Horizontal split (top/bottom)

# Start window index at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Set better colors
set -g default-terminal "screen-256color"

# Status bar settings
set -g status on
set -g status-interval 5
set -g status-justify centre

# Status bar styling
set -g status-bg black
set -g status-fg white

# Left side: session name + git branch if inside repo
set -g status-left '#[fg=green][#S] #(cd #{pane_current_path} && git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git rev-parse --abbrev-ref HEAD || echo "")#[default]'

# Right side: date and time
set -g status-right '#[fg=cyan]%Y-%m-%d %H:%M:%S'

# Window title styling
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[bold]#[fg=green]#I:#W#[default]'
